version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://n8n:5678
      # 關閉強制登入（方便 Lab 測試）
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_USER_MANAGEMENT_DISABLED=true
    volumes:
      - ./n8n/data:/home/node/.n8n
    networks:
      - pipeline-net
    restart: unless-stopped

networks:
  pipeline-net:
    external: true
