global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h
  receiver: 'all-webhooks'

  routes:
    - match:
        severity: critical
      receiver: 'all-webhooks'
      group_wait: 5s

receivers:
  - name: 'all-webhooks'
    webhook_configs:
      # 原有：n8n 處理 workflow 自動化
      - url: 'http://n8n:5678/webhook-test/alert-handler'
        send_resolved: true
        http_config: {}
        max_alerts: 0
      # 新增：ansible-rulebook EDA 事件驅動自動化
      - url: 'http://ansible-rulebook:5000/'
        send_resolved: true
        http_config: {}
        max_alerts: 0

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
